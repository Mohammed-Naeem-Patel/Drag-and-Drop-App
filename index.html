<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="left">
            <div class="list" draggable="true"><img src="Images/drag_drop_icon.png">HTML</div>
            <div class="list" draggable="true"><img src="Images/drag_drop_icon.png">CSS</div>
            <div class="list" draggable="true"><img src="Images/drag_drop_icon.png">Java Script</div>
            <div class="list" draggable="true"><img src="Images/drag_drop_icon.png">React</div>
        </div>
        <div id="right"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
